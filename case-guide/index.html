var quizData = [
  {t: "MagSafe対応iPhoneケースを選ぶ最大のメリットは何ですか？", o: [{x: "MagSafe対応充電器やアクセサリーが磁力でしっかり固定され、最適な充電効率や使い勝手が得られること", ok: true}, {x: "ケースを装着したままiPhoneを水没させても故障しないこと", ok: false}, {x: "ケースの素材が自動的に自己修復する機能があること", ok: false}, {x: "iPhoneのストレージ容量が2倍になること", ok: false}], e: "MagSafe対応ケースは、ワイヤレス充電器やカードウォレットなどが正確に位置合わせされ、安定して使えます。"},
  {t: "iPhoneケースの「耐衝撃性」を示すことが多い国際規格は何ですか？", o: [{x: "MIL-STD-810G（またはMILスペック）という米軍の物資調達規格", ok: true}, {x: "ISO 9001（品質マネジメントシステムに関する規格）", ok: false}, {x: "JIS Z 8101（用語に関する規格）", ok: false}, {x: "CEマーキング（EU域内で販売される製品の安全基準）", ok: false}], e: "MILスペックは、落下や振動、温度変化など厳しい環境下での耐久性を評価する規格です。安心の目安に。"},
  {t: "クリアタイプのiPhoneケースが時間と共に黄ばんでしまう主な原因は何ですか？", o: [{x: "紫外線や手の油分、熱などによるTPU素材の酸化・劣化", ok: true}, {x: "iPhone本体の発熱によるケースの溶解", ok: false}, {x: "ケースの内部にカビが発生しているため", ok: false}, {x: "iPhoneの画面から出るブルーライトの影響", ok: false}], e: "黄ばみにくい特殊加工や、ガラス・ポリカーボネート製のクリアケースを選ぶと長持ちします。"},
  {t: "iPhoneの画面保護を重視するケース選びで最も重要なポイントは何ですか？", o: [{x: "ディスプレイ面よりもケースのフチが高く設計されていること", ok: true}, {x: "ケースが非常に薄く、軽いこと", ok: false}, {x: "ケースの素材が金属製であること", ok: false}, {x: "ケースにカード収納機能があること", ok: false}], e: "フチが高いことで、平らな場所に伏せて置いた際に画面が直接触れるのを防ぎ、衝撃を吸収します。"},
  {t: "iPhoneのカメラレンズを傷から守るために、ケース選びで確認すべき点は何ですか？", o: [{x: "カメラ部分の開口部がレンズよりも高くなっているか、またはレンズを覆うカバーがあるか", ok: true}, {x: "ケースの背面が完全に透明であること", ok: false}, {x: "ケースの側面が柔らかい素材でできていること", ok: false}, {x: "ケースの重さが非常に軽いこと", ok: false}], e: "レンズ周りの高さやカバーは、落下時や平置き時の傷つきを防ぎ、カメラ機能を長く保ちます。"},
  {t: "ワイヤレス充電（Qi充電）対応のiPhoneケースを選ぶ際の注意点は何ですか？", o: [{x: "ケースの厚みがワイヤレス充電器の対応範囲内であること（一般的に3mm以内推奨）", ok: true}, {x: "ケースが防水機能を持っていること", ok: false}, {x: "ケースにカードホルダーが付いていないこと", ok: false}, {x: "ケースが特定のブランド品であること", ok: false}], e: "厚すぎるケースや金属製のケース、カード収納部に磁気カードを入れると充電できない場合があります。"},

  {t: "手帳型iPhoneケースを選ぶ主なメリットは何ですか？", o: [{x: "画面全体を覆うことで、傷や衝撃からiPhoneを保護できること", ok: true}, {x: "ワイヤレス充電速度が大幅に向上すること", ok: false}, {x: "iPhoneのバッテリー寿命が延びること", ok: false}, {x: "ケースを装着するだけで防水機能が付与されること", ok: false}], e: "手帳型は画面保護に加え、カード収納やスタンド機能を持つものが多く、利便性が高いです。"},
  {t: "ポリカーボネート（PC）素材のiPhoneケースとTPU素材のケースの一般的な違いで正しいものは何ですか？", o: [{x: "PCは硬く透明度が高いが衝撃吸収性は低い、TPUは柔らかく衝撃吸収性に優れる", ok: true}, {x: "PCは熱に弱く変形しやすいが、TPUは熱に非常に強い", ok: false}, {x: "PCは黄ばみやすいが、TPUは黄ばみにくい", ok: false}, {x: "PCは常にマットな質感だが、TPUは常に光沢がある", ok: false}], e: "PCはハードケース、TPUはソフトケースに多く使われ、両者を組み合わせたハイブリッド型も人気です。"},
  {t: "iPhoneケースの「グリップ感」を重視して選ぶ際に、どのような素材や加工が良いとされますか？", o: [{x: "シリコン、TPU、または表面にテクスチャ加工が施された素材", ok: true}, {x: "表面が非常に滑らかなガラス製や金属製", ok: false}, {x: "極端に薄く、表面がツルツルしたハードプラスチック製", ok: false}, {x: "ケースの厚みが均一で、角ばったデザインのもの", ok: false}], e: "滑りにくい素材や指紋がつきにくい加工は、iPhoneの落下リスクを減らし、安心して使えます。"},
  {t: "近年注目されている「環境配慮型」のiPhoneケースによく使われる素材は何ですか？", o: [{x: "生分解性プラスチックやリサイクル素材、植物由来の素材など", ok: true}, {x: "純粋なチタンやカーボンファイバー", ok: false}, {x: "高度な化学処理を施したフッ素樹脂", ok: false}, {x: "希少な天然鉱物", ok: false}], e: "地球環境に配慮した素材選びは、サステナブルな消費行動として重要視されています。"},
  {t: "「ハイブリッド型」のiPhoneケースが持つ一般的な特徴は何ですか？", o: [{x: "複数の異なる素材（例: 硬質な背面と柔らかい側面）を組み合わせて作られていること", ok: true}, {x: "ケース全体が水に浮くように設計されていること", ok: false}, {x: "iPhoneのバッテリーを内蔵していること", ok: false}, {x: "ケースの色が周囲の環境に合わせて自動的に変化すること", ok: false}], e: "落下時の衝撃吸収と背面保護を両立させることができ、デザインの幅も広がります。"},
  {t: "iPhoneケースと画面保護フィルムを併用する際に、特に注意すべき点は何ですか？", o: [{x: "ケースとフィルムが干渉せず、浮きや剥がれが生じないかを確認すること", ok: true}, {x: "フィルムが厚いほどケースは薄い方が良いこと", ok: false}, {x: "フィルムの色とケースの色を合わせること", ok: false}, {x: "ワイヤレス充電時にフィルムを外す必要があること", ok: false}], e: "ケースとフィルムの相性は重要です。特にフチ高ケースと全面保護フィルムは干渉しやすいので注意。"},
  {t: "一般的にiPhoneケースを交換する時期の目安として適切なものは何ですか？", o: [{x: "ケースの劣化（変色、ひび割れ、変形）が見られるか、保護機能が低下したと感じた時", ok: true}, {x: "iPhone本体のバッテリーが消耗してきた時", ok: false}, {x: "新しいiPhoneモデルが発表された時", ok: false}, {x: "1年に1回、季節の変わり目ごと", ok: false}], e: "劣化したケースは保護能力が落ち、iPhoneの破損リスクを高めます。定期的な確認が大切です。"},
  {t: "Apple純正iPhoneケースを選ぶ主なメリットは何ですか？", o: [{x: "iPhone本体とのフィット感が非常に高く、デザインや機能性が最適化されていること", ok: true}, {x: "どんな素材の純正ケースも完全に防水であること", ok: false}, {x: "純正ケースを装着するとiPhoneの通信速度が向上すること", ok: false}, {x: "他社のケースよりも大幅に安価であること", ok: false}], e: "純正品は品質と互換性が保証されており、特にMagSafe対応製品はAppleエコシステムとの連携がスムーズです。 <a href="https://worldselect.net/products/worldselect-0018?utm_source=fds_quiz&utm_medium=quiz_link&utm_campaign=case-guide" target="_blank" rel="noopener" style="color:#88619A;font-weight:600;">▶ iPhone MagSafeケースを見る</a> <a href="https://item.rakuten.co.jp/world11select/worldselect-0018/" target="_blank" style="display:inline-block;padding:2px 8px;background:#dc2626;color:#fff;border-radius:99px;font-size:10px;font-weight:700;text-decoration:none;margin-left:4px;vertical-align:middle">楽天</a> <a href="https://store.shopping.yahoo.co.jp/world1select/worldselect-0018.html" target="_blank" style="display:inline-block;padding:2px 8px;background:#dc2626;color:#fff;border-radius:99px;font-size:10px;font-weight:700;text-decoration:none;margin-left:2px;vertical-align:middle">Yahoo</a>"}
];

var LEVELS = [
  {min: Math.ceil(15*0.9), level: "エキスパート", color: "#7c3aed", desc: "完璧な知識！周りへのアドバイス役にぴったり。"},
  {min: Math.ceil(15*0.7), level: "上級者", color: "--c-grape", desc: "しっかりした知識をお持ちです。"},
  {min: Math.ceil(15*0.5), level: "中級者", color: "#34c759", desc: "基本はOK。もう少し深掘りするとさらに安心。"},
  {min: 0, level: "初級者", color: "#d97706", desc: "ここから学ぶと選び方が変わります！"}
];

var cur = 0, score = 0, answered = false;

function render() {
  var q = quizData[cur];
  document.getElementById('progressFill').style.width = ((cur / quizData.length) * 100) + '%';
  document.getElementById('questionNumber').textContent = 'Q' + (cur + 1) + ' / ' + quizData.length;
  document.getElementById('questionText').textContent = q.t;
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('nextBtn').textContent = '答えを見る';
  answered = false;
  var opts = shuffle(q.o.slice());
  var c = document.getElementById('optionsContainer');
  c.innerHTML = '';
  opts.forEach(function(o, i) {
    var btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = o.x;
    btn.dataset.ok = o.ok;
    btn.onclick = function() { choose(btn, opts); };
    c.appendChild(btn);
  });
}

function choose(btn, opts) {
  if (answered) return;
  answered = true;
  var correct = btn.dataset.ok === 'true';
  if (correct) { score++; btn.classList.add('correct'); }
  else { btn.classList.add('wrong'); }
  document.querySelectorAll('.option').forEach(function(b) {
    b.classList.add('answered');
    if (b.dataset.ok === 'true') b.classList.add('correct');
  });
  var exp = document.getElementById('explanation');
  exp.innerHTML = quizData[cur].e;
  exp.classList.add('show');
  document.getElementById('nextBtn').textContent = cur < quizData.length - 1 ? '次の問題 →' : '結果を見る';
}

document.getElementById('nextBtn').addEventListener('click', function() {
  if (!answered) return;
  cur++;
  if (cur < quizData.length) { render(); }
  else { showResult(); }
});

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'block';
  document.getElementById('resultScore').textContent = score + ' / ' + quizData.length;
  var lv = LEVELS[LEVELS.length - 1];
  for (var i = 0; i < LEVELS.length; i++) {
    if (score >= LEVELS[i].min) { lv = LEVELS[i]; break; }
  }
  var el = document.getElementById('resultLevel');
  el.textContent = lv.level;
  el.style.background = lv.color;
  document.getElementById('resultDesc').textContent = lv.desc;
}

function restart() {
  cur = 0; score = 0; answered = false;
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('resultScreen').style.display = 'none';
  render();
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

render();
</script>
